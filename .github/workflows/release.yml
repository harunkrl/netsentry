# KPortWatch — Release Workflow
#
# Triggered manually or by pushing a version tag (vX.Y.Z).
# Runs full CI, then publishes a GitHub Release with the wheel.
#
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=backend --cov=tui --cov=shared --cov-fail-under=75

  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: KPortWatch ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/kportwatch-*.whl
            dist/kportwatch-*.tar.gz
