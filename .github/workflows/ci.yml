# KPortWatch — CI Pipeline
#
# Runs on every push and PR to main.
# Steps: lint → test → build verification
#
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v --tb=short --cov=backend --cov=tui --cov=shared --cov-report=term-missing --cov-fail-under=75

      - name: Verify imports
        run: |
          python -c "from shared import AlertLevel, DATA_FILE, MALICIOUS_PORTS"
          python -c "from backend.models import SocketEntry, Alert, Snapshot"
          python -c "from backend.parsers.proc_net import parse_all_proc"
          python -c "from backend.alert_engine import AlertEngine"
          python -c "from backend.writers.json_file import write_snapshot, read_snapshot"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff check
        run: ruff check . --ignore E501

      - name: Ruff format check
        run: ruff format --check .

      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r backend shared -ll -ii || true

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit || true

      - name: QML syntax check (qmllint)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq qtdeclarative5-dev-tools
          qmllint widget/contents/ui/*.qml || true

  build:
    name: Build verification
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify wheel
        run: |
          pip install dist/kportwatch-*.whl
          kportwatch-daemon --help
          kportwatch-tui --help
          kportwatchctl --help
          kportwatch-export --help
